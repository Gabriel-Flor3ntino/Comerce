spring.application.name=comerce

# -------------------------------------------------------
# Perfil ativo: 'dev' usa H2 em memória (sem precisar do PostgreSQL)
# Para produção com PostgreSQL, troque por: spring.profiles.active=prod
# -------------------------------------------------------
spring.profiles.active=dev

# H2 Console (apenas desenvolvimento)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# DataSource H2 (perfil dev)
spring.datasource.url=jdbc:h2:mem:comercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Upload de arquivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -------------------------------------------------------
# Para usar PostgreSQL em produção, crie application-prod.properties com:
# spring.datasource.url=jdbc:postgresql://localhost:5432/comercedb
# spring.datasource.username=seu_usuario
# spring.datasource.password=sua_senha
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update
# -------------------------------------------------------
