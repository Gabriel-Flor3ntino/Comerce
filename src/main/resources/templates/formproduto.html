<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Commerce - Form Produto</title>

    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <link th:href="@{/css/fileinput.min.css}" rel="stylesheet" />
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/assets/img/logos/logo.png}" />
        </a>
    </div>
</nav>

<header class="masthead"></header>

<!-- FORM -->
<section class="page-section">
    <div class="container">

        <div class="text-center">
            <h2 class="section-heading text-uppercase"
                th:text="${produto.id == null} ? 'Novo Produto' : 'Editar Produto'">
            </h2>
        </div>

        <form th:action="@{/produtos/salvar}"
              th:object="${produto}"
              method="post"
              enctype="multipart/form-data">

            <!-- ID -->
            <input type="hidden" th:field="*{id}" />

            <!-- IMAGEM -->
            <div class="form-group">
                <input type="file" name="imagem" class="form-control"/>
            </div>

            <!-- NOME -->
            <div class="form-group">
                <input type="text"
                       class="form-control"
                       placeholder="Nome *"
                       th:field="*{nome}"
                       required />
            </div>

            <!-- VALOR -->
            <div class="form-group">
                <input type="number"
                       step="0.01"
                       class="form-control"
                       placeholder="Valor (R$)"
                       th:field="*{valor}"
                       required />
            </div>

            <!-- DESCRIÇÃO -->
            <div class="form-group">
                <textarea class="form-control"
                          placeholder="Descrição"
                          th:field="*{descricao}">
                </textarea>
            </div>

            <!-- CATEGORIA -->
            <div class="form-group">
                <select class="form-control"
                        th:field="*{categoria}"
                        required>

                    <option value="">Selecione</option>

                    <option th:each="cat : ${categorias}"
                            th:value="${cat.id}"
                            th:text="${cat.nome}">
                    </option>

                </select>
            </div>

            <!-- DATA -->
            <div class="form-group">
                <input type="date"
                       class="form-control"
                       th:field="*{dataValidade}" />
            </div>

            <!-- BOTÕES -->
            <div class="text-center">
                <button type="submit"
                        class="btn btn-primary btn-xl">
                    Salvar
                </button>

                <a th:href="@{/produtos}"
                   class="btn btn-secondary btn-xl">
                    Cancelar
                </a>
            </div>

        </form>

    </div>
</section>

<footer class="footer py-4 text-center">
    <div class="container">
        © 2021 DankiCommerce
    </div>
</footer>

<script th:src="@{/js/scripts.js}"></script>
<script th:src="@{/js/jquery.mask.min.js}"></script>

</body>
</html>
