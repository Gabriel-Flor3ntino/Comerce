<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Commerce - Categorias</title>

    <link rel="icon" th:href="@{/assets/img/favicon.ico}" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body id="page-top">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/assets/img/logos/logo.png}" alt="Logo" />
        </a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ml-auto text-uppercase">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categorias}">Categorias</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cadastrar}">Cadastrar-se</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- HEADER -->
<header class="masthead"></header>

<!-- CATEGORIAS -->
<section class="page-section" id="categorias">
    <div class="container">

        <div class="text-center">
            <h2 class="section-heading text-uppercase mb-3">Categorias</h2>
        </div>

        <!-- BOTÃO NOVA -->
        <a th:href="@{/categorias/nova}" class="btn btn-success mb-3">
            <i class="fas fa-plus"></i> Nova Categoria
        </a>

        <!-- TABELA -->
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="categoria, iter : ${categorias}">
                    <td th:text="${iter.index + 1}"></td>
                    <td th:text="${categoria.nome}"></td>

                    <td>
                        <!-- EDITAR -->
                        <a th:href="@{/categorias/editar/{id}(id=${categoria.id})}"
                           class="btn btn-info">
                            <i class="fas fa-edit"></i>
                        </a>

                        <!-- EXCLUIR -->
                        <a th:href="@{/categorias/excluir/{id}(id=${categoria.id})}"
                           class="btn btn-danger"
                           onclick="return confirm('Deseja excluir esta categoria?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>

                <!-- CASO NÃO TENHA DADOS -->
                <tr th:if="${#lists.isEmpty(categorias)}">
                    <td colspan="3" class="text-center">
                        Nenhuma categoria cadastrada
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer py-4 text-center">
    <div class="container">
        © 2021 DankiCommerce
    </div>
</footer>

<script th:src="@{/js/scripts.js}"></script>

</body>
</html>
