<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Commerce - Categorias</title>
    <link rel="icon" th:href="@{/assets/img/favicon.ico}" />
    <script src="https://use.fontawesome.com/releases/v5.15.1/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body id="page-top">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/assets/img/logos/logo.png}" alt="Logo" />
        </a>
        <button class="navbar-toggler navbar-toggler-right" type="button"
                data-toggle="collapse" data-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            Menu <i class="fas fa-bars ml-1"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ml-auto text-uppercase">
                <li class="nav-item"><a class="nav-link" th:href="@{/categorias}">Categorias</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/produtos}">Produtos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/login}">Login</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/cadastrar}">Cadastrar-se</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HEADER -->
<header class="masthead">
    <div class="container">
        <div class="masthead-subheading">Gerenciamento</div>
        <div class="masthead-heading text-uppercase">Categorias</div>
    </div>
</header>

<!-- CATEGORIAS -->
<section class="page-section" id="categorias">
    <div class="container">

        <div class="text-center mb-4">
            <h2 class="section-heading text-uppercase">Categorias</h2>
        </div>

        <!-- BOTÃO NOVA CATEGORIA -->
        <!--
            CORRIGIDO: link apontava para /categorias/nova — rota agora mapeada corretamente
            no CategoriasController (@GetMapping("/nova")).
        -->
        <a th:href="@{/categorias/nova}" class="btn btn-success mb-3">
            <i class="fas fa-plus mr-1"></i> Nova Categoria
        </a>

        <!-- TABELA -->
        <table class="table table-hover">
            <thead class="thead-dark">
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <!--
                    CORRIGIDO: ${categorias} precisa ser injetado pelo controller.
                    CategoriasController agora faz model.addAttribute("categorias", repository.findAll()).
                    O atributo ${iter.index} foi mantido (funciona com iterStat no Thymeleaf 3).
                -->
                <tr th:each="categoria, iter : ${categorias}">
                    <td th:text="${iter.index + 1}"></td>
                    <td th:text="${categoria.nome}"></td>
                    <td>
                        <!-- EDITAR -->
                        <a th:href="@{/categorias/editar/{id}(id=${categoria.id})}"
                           class="btn btn-info btn-sm">
                            <i class="fas fa-edit"></i> Editar
                        </a>
                        <!-- EXCLUIR -->
                        <a th:href="@{/categorias/excluir/{id}(id=${categoria.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Deseja excluir esta categoria?')">
                            <i class="fas fa-trash"></i> Excluir
                        </a>
                    </td>
                </tr>

                <!-- MENSAGEM QUANDO LISTA VAZIA -->
                <tr th:if="${#lists.isEmpty(categorias)}">
                    <td colspan="3" class="text-center text-muted">
                        Nenhuma categoria cadastrada. <a th:href="@{/categorias/nova}">Criar primeira categoria</a>.
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer py-4 text-center">
    <div class="container">
        &copy; 2026 Commerce
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
