<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>E-Commerce - Produtos</title>
    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.ico}" />
    <script src="https://use.fontawesome.com/releases/v5.15.1/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body id="page-top">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/assets/img/logos/logo.png}" alt="Logo" />
            </a>
            <button class="navbar-toggler navbar-toggler-right" type="button"
                    data-toggle="collapse" data-target="#navbarResponsive"
                    aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                Menu <i class="fas fa-bars ml-1"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav text-uppercase ml-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/categorias}">Categorias</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/produtos}">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/login}">Login</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/cadastrar}">Cadastrar-se</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Masthead -->
    <header class="masthead">
        <div class="container">
            <div class="masthead-subheading">Explore nosso</div>
            <div class="masthead-heading text-uppercase">Catálogo</div>
        </div>
    </header>

    <!-- Produtos -->
    <section class="page-section bg-light" id="portfolio">
        <div class="container">

            <div class="text-center mb-4">
                <h2 class="section-heading text-uppercase">Produtos</h2>
            </div>

            <!-- BARRA DE PESQUISA + FILTRO POR CATEGORIA -->
            <!--
                CORRIGIDO: o formulário original não tinha action definida nem enviava os dados para o servidor.
                O input de pesquisa tinha type="email" — incorreto para busca de texto.
                O select de categoria tinha duplicate id="email" — inválido no HTML.
                O botão "Novo Produto" usava onclick com href para arquivo .html estático.
                Tudo corrigido abaixo.
            -->
            <form th:action="@{/produtos/pesquisar}" method="get" class="mb-4">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-group">
                            <!-- CORRIGIDO: type text em vez de email; name="q" para o controller capturar -->
                            <input class="form-control"
                                   id="pesquisa"
                                   name="q"
                                   type="text"
                                   placeholder="Pesquisar produto..."
                                   th:value="${query}" />
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <!-- CORRIGIDO: id único "categoriaFiltro"; populado dinamicamente pelo controller -->
                            <select class="form-control" id="categoriaFiltro" name="categoriaId">
                                <option value="">Todas as categorias</option>
                                <option th:each="cat : ${categorias}"
                                        th:value="${cat.id}"
                                        th:text="${cat.nome}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-block">
                                <i class="fas fa-search mr-1"></i> Pesquisar
                            </button>
                        </div>
                    </div>
                </div>
            </form>

            <!-- BOTÃO NOVO PRODUTO -->
            <!--
                CORRIGIDO: antes usava onclick="window.location.href='formproduto.html#formproduto'"
                apontando para arquivo estático — quebra no Spring Boot.
                Substituído por link Thymeleaf para /produtos/novo.
            -->
            <div class="mb-4">
                <a th:href="@{/produtos/novo}" class="btn btn-success">
                    <i class="fas fa-plus mr-1"></i> Novo Produto
                </a>
            </div>

            <!-- GRID DE PRODUTOS (dinâmico via th:each) -->
            <!--
                CORRIGIDO: a página original tinha produtos hardcoded com imagens estáticas
                e links para modais fixos. Substituído por iteração dinâmica na lista ${produtos}
                injetada pelo ProdutosController.
            -->
            <div class="row" th:if="${!#lists.isEmpty(produtos)}">
                <div class="col-lg-4 col-sm-6 mb-4"
                     th:each="produto, iterStat : ${produtos}">
                    <div class="portfolio-item">
                        <a class="portfolio-link"
                           data-toggle="modal"
                           th:href="'#modalProduto' + ${iterStat.index}">
                            <div class="portfolio-hover">
                                <div class="portfolio-hover-content">
                                    <i class="fas fa-plus fa-3x"></i>
                                </div>
                            </div>
                            <!-- Imagem do produto ou placeholder -->
                            <img class="img-fluid"
                                 th:src="${produto.imagemUrl != null ? produto.imagemUrl : '/assets/img/portfolio/01-thumbnail.jpg'}"
                                 th:alt="${produto.nome}" />
                        </a>
                        <div class="portfolio-caption">
                            <div class="portfolio-caption-heading"
                                 th:text="${'R$ ' + #numbers.formatDecimal(produto.valor, 1, 'POINT', 2, 'COMMA')}">
                            </div>
                            <div class="portfolio-caption-subheading text-muted"
                                 th:text="${produto.nome}">
                            </div>
                        </div>
                    </div>

                    <!-- Modal de cada produto -->
                    <div class="portfolio-modal modal fade"
                         th:id="'modalProduto' + ${iterStat.index}"
                         tabindex="-1" role="dialog" aria-hidden="true">
                        <div class="modal-dialog mx-auto">
                            <div class="modal-content">
                                <div class="close-modal" data-dismiss="modal">
                                    <img th:src="@{/assets/img/close-icon.svg}" alt="Fechar" />
                                </div>
                                <div class="container">
                                    <div class="row justify-content-center">
                                        <div class="col-lg-8">
                                            <div class="modal-body">
                                                <img class="img-fluid d-block mx-auto img-modal"
                                                     th:src="${produto.imagemUrl != null ? produto.imagemUrl : '/assets/img/portfolio/01-full.jpg'}"
                                                     th:alt="${produto.nome}" />
                                                <h2 class="text-uppercase"
                                                    th:text="${'R$ ' + #numbers.formatDecimal(produto.valor, 1, 'POINT', 2, 'COMMA')}">
                                                </h2>
                                                <p class="item-intro text-muted" th:text="${produto.nome}"></p>
                                                <p th:text="${produto.descricao}"></p>
                                                <ul class="list-inline">
                                                    <li th:if="${produto.dataValidade != null}"
                                                        th:text="${'Válido até: ' + #temporals.format(produto.dataValidade, 'dd/MM/yyyy')}">
                                                    </li>
                                                    <li th:if="${produto.categoria != null}"
                                                        th:text="${'Categoria: ' + produto.categoria.nome}">
                                                    </li>
                                                </ul>
                                                <div class="d-flex justify-content-center">
                                                    <button class="btn btn-primary btn-xl text-uppercase mr-2"
                                                            type="button">
                                                        Comprar
                                                    </button>
                                                    <!--
                                                        CORRIGIDO: o botão Editar apontava para 'formproduto.html#formproduto' (arquivo estático).
                                                        Substituído por link Thymeleaf para /produtos/editar/{id}.
                                                    -->
                                                    <a th:href="@{/produtos/editar/{id}(id=${produto.id})}"
                                                       class="btn btn-info btn-xl text-uppercase">
                                                        <i class="fas fa-edit mr-1"></i> Editar
                                                    </a>
                                                    <a th:href="@{/produtos/excluir/{id}(id=${produto.id})}"
                                                       class="btn btn-danger btn-xl text-uppercase ml-2"
                                                       onclick="return confirm('Excluir este produto?')">
                                                        <i class="fas fa-trash mr-1"></i> Excluir
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- /Modal -->

                </div>
            </div>

            <!-- Mensagem quando não há produtos -->
            <div class="text-center py-5" th:if="${#lists.isEmpty(produtos)}">
                <p class="text-muted lead">Nenhum produto cadastrado ainda.</p>
                <a th:href="@{/produtos/novo}" class="btn btn-success btn-xl">
                    <i class="fas fa-plus mr-1"></i> Cadastrar primeiro produto
                </a>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer py-4">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-4 text-lg-left">Copyright &copy; DankiCommerce 2021</div>
                <div class="col-lg-4 my-3 my-lg-0">
                    <a class="btn btn-dark btn-social mx-2" href="#!"><i class="fab fa-twitter"></i></a>
                    <a class="btn btn-dark btn-social mx-2" href="#!"><i class="fab fa-facebook-f"></i></a>
                    <a class="btn btn-dark btn-social mx-2" href="#!"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <div class="col-lg-4 text-lg-right">
                    <a class="mr-3" href="#!">Privacy Policy</a>
                    <a href="#!">Terms of Use</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>
    <script th:src="@{/js/scripts.js}"></script>
</body>
</html>
