<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Commerce - Form Categoria</title>

    <link rel="icon" th:href="@{/assets/img/favicon.ico}" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/assets/img/logos/logo.png}" alt="Logo" />
        </a>
    </div>
</nav>

<!-- HEADER -->
<header class="masthead"></header>

<!-- FORM -->
<section class="page-section" id="formcategoria">
    <div class="container">

        <div class="text-center">
            <h2 class="section-heading text-uppercase"
                th:text="${categoria.id == null} ? 'Nova Categoria' : 'Editar Categoria'">
            </h2>
        </div>

        <form th:action="@{/categorias/salvar}"
              th:object="${categoria}"
              method="post">

            <!-- ID (oculto para edição) -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <input type="text"
                       class="form-control"
                       placeholder="Nome *"
                       th:field="*{nome}"
                       required />
            </div>

            <div class="text-center">
                <button type="submit"
                        class="btn btn-primary btn-xl text-uppercase">
                    Salvar
                </button>

                <a th:href="@{/categorias}"
                   class="btn btn-secondary btn-xl text-uppercase">
                    Cancelar
                </a>
            </div>

        </form>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer py-4 text-center">
    <div class="container">
        © 2021 DankiCommerce
    </div>
</footer>

<script th:src="@{/js/scripts.js}"></script>

</body>
</html>
