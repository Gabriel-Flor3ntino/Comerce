<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Commerce - Categoria</title>
    <link rel="icon" th:href="@{/assets/img/favicon.ico}" />
    <script src="https://use.fontawesome.com/releases/v5.15.1/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
</head>

<body id="page-top">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/assets/img/logos/logo.png}" alt="Logo" />
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ml-auto text-uppercase">
                <li class="nav-item"><a class="nav-link" th:href="@{/categorias}">Categorias</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/produtos}">Produtos</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/login}">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HEADER -->
<header class="masthead">
    <div class="container">
        <div class="masthead-subheading">Gerenciamento</div>
        <!--
            CORRIGIDO: o título condicional usa ${categoria.id == null} que é válido no Thymeleaf
            desde que o objeto 'categoria' seja injetado pelo controller via model.addAttribute.
            CategoriasController agora faz isso nos métodos nova() e editar().
        -->
        <div class="masthead-heading text-uppercase"
             th:text="${categoria.id == null} ? 'Nova Categoria' : 'Editar Categoria'">
        </div>
    </div>
</header>

<!-- FORM -->
<section class="page-section" id="formcategoria">
    <div class="container">

        <div class="text-center mb-4">
            <h2 class="section-heading text-uppercase"
                th:text="${categoria.id == null} ? 'Nova Categoria' : 'Editar Categoria'">
            </h2>
        </div>

        <!--
            CORRIGIDO: th:action aponta para /categorias/salvar (POST mapeado no controller).
            th:object requer que o controller injete "categoria" no model — feito.
        -->
        <form th:action="@{/categorias/salvar}"
              th:object="${categoria}"
              method="post">

            <!-- Campo oculto para ID (necessário na edição para o JPA fazer UPDATE e não INSERT) -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label for="nome">Nome da Categoria *</label>
                <input type="text"
                       id="nome"
                       class="form-control"
                       placeholder="Nome *"
                       th:field="*{nome}"
                       required />
                <p class="help-block text-danger"
                   th:if="${#fields.hasErrors('nome')}"
                   th:errors="*{nome}"></p>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-xl text-uppercase">
                    Salvar
                </button>
                <a th:href="@{/categorias}" class="btn btn-secondary btn-xl text-uppercase ml-2">
                    Cancelar
                </a>
            </div>

        </form>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer py-4 text-center">
    <div class="container">
        &copy; 2021 DankiCommerce
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
