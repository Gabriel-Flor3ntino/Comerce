<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Commerce - Cadastrar</title>

    <link rel="icon" type="image/x-icon" th:href="@{/assets/img/favicon.ico}" />

    <!-- CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" />
</head>

<body id="page-top">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/assets/img/logos/logo.png}" alt="Logo" />
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive">
            Menu
        </button>

        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ml-auto text-uppercase">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/categorias}">Categorias</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cadastrar}">Cadastrar-se</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- HEADER -->
<header class="masthead" id="cadastrar-header">
    <div class="container"></div>
</header>

<!-- FORMULÁRIO -->
<section class="page-section" id="cadastrar">
    <div class="container">

        <div class="text-center">
            <h2 class="section-heading text-uppercase">Cadastre-se</h2>
            <h3 class="section-subheading text-muted">Crie seu cadastro gratuitamente</h3>
        </div>

        <form th:action="@{/cadastrar}" th:object="${usuario}" method="post">

            <div class="form-group">
                <input type="text"
                       class="form-control"
                       placeholder="Nome *"
                       th:field="*{nome}"
                       required />
            </div>

            <div class="form-group">
                <input type="email"
                       class="form-control"
                       placeholder="Email *"
                       th:field="*{email}"
                       required />
            </div>

            <div class="form-group">
                <input type="password"
                       class="form-control"
                       placeholder="Senha *"
                       th:field="*{senha}"
                       required />
            </div>

            <button type="submit" class="btn btn-primary btn-xl text-uppercase">
                Cadastrar
            </button>

        </form>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer py-4">
    <div class="container text-center">
        <span>© 2021 DankiCommerce</span>
    </div>
</footer>

<!-- JS -->
<script th:src="@{/js/scripts.js}"></script>

</body>
</html>
